# Temporary workflow to test Docker and musl build infrastructure on a PR.
# DELETE THIS FILE before merging.

name: Test Docker & Musl Builds

on:
  pull_request:

permissions:
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-platform.yml
    with:
      upload-artifacts: true

  docker:
    needs: build
    uses: ./.github/workflows/docker.yml
    with:
      version: 0.0.0-test
      push: false
